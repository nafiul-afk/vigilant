{% extends "base.html" %}
{% block title %}Edit — {{ sub.service_name }}{% endblock %}

{% block nav_items %}
<a href="/dashboard" class="flex items-center gap-2 px-3 py-2 text-sm text-gray-400 hover:text-white rounded-lg hover:bg-white/[0.04] transition-all">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    Dashboard
</a>
{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12 animate-fade-in">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-white">Edit Subscription</h1>
        <p class="mt-1 text-gray-400">Update details for <span class="text-brand-400">{{ sub.service_name }}</span></p>
    </div>

    <div class="bg-surface-900/60 border border-white/[0.06] rounded-2xl p-8 backdrop-blur-sm">
        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/subscriptions/{{ sub.id }}/edit" class="space-y-6" id="edit-sub-form">
            <div>
                <label for="service_name" class="block text-sm font-medium text-gray-300 mb-2">Service Name *</label>
                <input type="text" id="service_name" name="service_name" required value="{{ sub.service_name }}"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all duration-200" />
            </div>
            <div>
                <label for="service_url" class="block text-sm font-medium text-gray-300 mb-2">Service URL</label>
                <input type="url" id="service_url" name="service_url" value="{{ sub.service_url or '' }}"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all duration-200" />
            </div>
            <div>
                <label for="trial_end_date" class="block text-sm font-medium text-gray-300 mb-2">Trial End Date *</label>
                <input type="date" id="trial_end_date" name="trial_end_date" required value="{{ sub.trial_end_date.isoformat() }}"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all duration-200" />
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="cost_per_cycle" class="block text-sm font-medium text-gray-300 mb-2">Cost</label>
                    <input type="number" id="cost_per_cycle" name="cost_per_cycle" step="0.01" value="{{ sub.cost_per_cycle or '' }}"
                        class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all duration-200" />
                </div>
                <div>
                    <label for="billing_cycle" class="block text-sm font-medium text-gray-300 mb-2">Billing Cycle</label>
                    <select id="billing_cycle" name="billing_cycle"
                        class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all duration-200">
                        <option value="monthly" {{ 'selected' if sub.billing_cycle == 'monthly' }}>Monthly</option>
                        <option value="yearly" {{ 'selected' if sub.billing_cycle == 'yearly' }}>Yearly</option>
                        <option value="weekly" {{ 'selected' if sub.billing_cycle == 'weekly' }}>Weekly</option>
                    </select>
                </div>
            </div>
            <div>
                <label for="cancel_url" class="block text-sm font-medium text-gray-300 mb-2">Cancellation URL</label>
                <input type="url" id="cancel_url" name="cancel_url" value="{{ sub.cancel_url or '' }}"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all duration-200" />
            </div>
            <div>
                <label for="notes" class="block text-sm font-medium text-gray-300 mb-2">Notes</label>
                <textarea id="notes" name="notes" rows="3"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all duration-200 resize-none">{{ sub.notes or '' }}</textarea>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                    class="flex-1 py-3 px-4 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-semibold rounded-xl shadow-lg shadow-brand-500/25 transition-all duration-300">
                    Save Changes
                </button>
                <a href="/dashboard"
                    class="py-3 px-6 bg-surface-800 border border-white/[0.08] text-gray-300 font-medium rounded-xl hover:bg-white/[0.04] transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
