<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vigilant — Never get charged for a free trial again. Monitor subscriptions, get alerts before billing." />
    <title>{% block title %}Vigilant{% endblock %} — Subscription Guardian</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#eef9ff',
                            100: '#d8f1ff',
                            200: '#b9e8ff',
                            300: '#89dbff',
                            400: '#52c4ff',
                            500: '#2aa5ff',
                            600: '#1486f5',
                            700: '#0d6de1',
                            800: '#1258b6',
                            900: '#154b8f',
                            950: '#0a2340',
                        },
                        surface: {
                            800: '#1a1d23',
                            850: '#15171c',
                            900: '#0f1115',
                            950: '#0a0b0e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(42,165,255,0.2), 0 0 20px rgba(42,165,255,0.1)' },
                            '100%': { boxShadow: '0 0 10px rgba(42,165,255,0.4), 0 0 40px rgba(42,165,255,0.2)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/css/custom.css" />

    {% block head %}{% endblock %}
</head>

<body class="bg-surface-950 text-gray-200 font-sans antialiased min-h-screen flex flex-col">

    <!-- ── Navbar ─────────────────────────────────────────────────────── -->
    <nav class="sticky top-0 z-50 border-b border-white/5 bg-surface-950/80 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Brand -->
                <a href="/" class="flex items-center gap-3 group">
                    <div class="relative">
                        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg shadow-brand-500/25 group-hover:shadow-brand-500/40 transition-shadow duration-300">
                            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </div>
                        <div class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-400 rounded-full animate-pulse-slow border-2 border-surface-950"></div>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                        Vigilant
                    </span>
                </a>

                <!-- Nav links -->
                <div class="flex items-center gap-2">
                    {% block nav_items %}{% endblock %}
                </div>
            </div>
        </div>
    </nav>

    <!-- ── Main Content ──────────────────────────────────────────────── -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- ── Footer ────────────────────────────────────────────────────── -->
    <footer class="border-t border-white/5 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <p class="text-sm text-gray-500">
                    &copy; 2026 <span class="text-gray-400">Vigilant</span>. Never get charged for a free trial again.
                </p>
                <div class="flex items-center gap-1.5 text-xs text-gray-600">
                    <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse-slow"></div>
                    Watcher Active
                </div>
            </div>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
