{% extends "base.html" %}
{% block title %}Track New Trial{% endblock %}

{% block nav_items %}
<a href="/dashboard" class="flex items-center gap-2 px-3 py-2 text-sm text-gray-400 hover:text-white rounded-lg hover:bg-white/[0.04] transition-all">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    Dashboard
</a>
{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12 animate-fade-in">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-white">Track a New Trial</h1>
        <p class="mt-1 text-gray-400">Add a subscription or free trial to monitor</p>
    </div>

    <div class="bg-surface-900/60 border border-white/[0.06] rounded-2xl p-8 backdrop-blur-sm">
        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center gap-3">
            <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />
            </svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/subscriptions/add" class="space-y-6" id="add-sub-form">
            <!-- Service name -->
            <div>
                <label for="service_name" class="block text-sm font-medium text-gray-300 mb-2">Service Name *</label>
                <input type="text" id="service_name" name="service_name" required
                    placeholder="e.g., Netflix, Adobe Creative Cloud"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all duration-200" />
            </div>

            <!-- Service URL -->
            <div>
                <label for="service_url" class="block text-sm font-medium text-gray-300 mb-2">Service URL</label>
                <input type="url" id="service_url" name="service_url"
                    placeholder="https://www.netflix.com"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all duration-200" />
            </div>

            <!-- Date row -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="trial_start_date" class="block text-sm font-medium text-gray-300 mb-2">Trial Start Date *</label>
                    <input type="date" id="trial_start_date" name="trial_start_date" required
                        value="{{ today }}"
                        class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all duration-200" />
                </div>
                <div>
                    <label for="trial_end_date" class="block text-sm font-medium text-gray-300 mb-2">Trial End Date *</label>
                    <input type="date" id="trial_end_date" name="trial_end_date" required
                        class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all duration-200" />
                </div>
            </div>

            <!-- Cost row -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="cost_per_cycle" class="block text-sm font-medium text-gray-300 mb-2">Cost After Trial</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">$</span>
                        <input type="number" id="cost_per_cycle" name="cost_per_cycle" step="0.01" min="0"
                            placeholder="9.99"
                            class="w-full pl-8 pr-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all duration-200" />
                    </div>
                </div>
                <div>
                    <label for="billing_cycle" class="block text-sm font-medium text-gray-300 mb-2">Billing Cycle</label>
                    <select id="billing_cycle" name="billing_cycle"
                        class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all duration-200">
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                        <option value="weekly">Weekly</option>
                        <option value="one-time">One-time</option>
                    </select>
                </div>
            </div>

            <!-- Cancel URL -->
            <div>
                <label for="cancel_url" class="block text-sm font-medium text-gray-300 mb-2">Cancellation URL</label>
                <input type="url" id="cancel_url" name="cancel_url"
                    placeholder="https://www.netflix.com/cancelplan"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all duration-200" />
            </div>

            <!-- Notes -->
            <div>
                <label for="notes" class="block text-sm font-medium text-gray-300 mb-2">Notes</label>
                <textarea id="notes" name="notes" rows="3"
                    placeholder="Any reminders for yourself…"
                    class="w-full px-4 py-3 bg-surface-800 border border-white/[0.08] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all duration-200 resize-none"></textarea>
            </div>

            <!-- Submit -->
            <div class="flex items-center gap-3 pt-2">
                <button type="submit" id="submit-add-btn"
                    class="flex-1 py-3 px-4 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-semibold rounded-xl shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 transition-all duration-300 transform hover:-translate-y-0.5">
                    Start Tracking
                </button>
                <a href="/dashboard"
                    class="py-3 px-6 bg-surface-800 border border-white/[0.08] text-gray-300 font-medium rounded-xl hover:bg-white/[0.04] transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
